openapi: 3.0.3
info:
  title: StockSync API
  version: 1.2.0
  description: Multi-channel inventory management and analytics API with full pagination and error handling.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    InventoryItem:
      type: object
      required: [sku, name]
      properties:
        sku: { type: string, example: "WJK01" }
        name: { type: string, example: "Winter Jacket" }
        total_stock: { type: integer, example: 150 }
        channels:
          type: array
          items:
            type: object
            properties:
              platform: { type: string, example: "Shopify" }
              stock: { type: integer, example: 50 }
    PaginatedInventory:
      type: object
      properties:
        total: { type: integer, example: 100 }
        limit: { type: integer, example: 20 }
        offset: { type: integer, example: 0 }
        items:
          type: array
          items: { $ref: '#/components/schemas/InventoryItem' }
    ErrorResponse:
      type: object
      properties:
        status: { type: integer, example: 400 }
        error: { type: string, example: "Bad Request" }
        message: { type: string, example: "Invalid SKU format provided." }
security:
  - bearerAuth: []
paths:
  /inventory:
    get:
      summary: 1. READ (List) - Get all products with pagination
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: A paginated list of inventory items.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedInventory' }
        '401':
          description: Unauthorized - Valid JWT required.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    post:
      summary: 2. CREATE - Create a new inventory record
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryItem' }
      responses:
        '201':
          description: Created successfully.
        '400':
          description: Validation error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized.
  /inventory/{sku}:
    get:
      summary: 3. READ (Detail) - Get detailed info for a specific SKU
      parameters:
        - in: path
          name: sku
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InventoryItem' }
        '404':
          description: Product not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      summary: 4. UPDATE - Partially update stock levels or details
      parameters:
        - in: path
          name: sku
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                total_stock: { type: integer }
      responses:
        '200':
          description: Updated successfully.
        '400':
          description: Invalid update data.
        '404':
          description: Product not found.
    delete:
      summary: 5. DELETE - Remove a SKU from the system
      parameters:
        - in: path
          name: sku
          required: true
          schema: { type: string }
      responses:
        '204':
          description: No Content - Successfully deleted.
        '404':
          description: Product not found.