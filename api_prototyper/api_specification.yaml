openapi: 3.0.3
info:
  title: StockSync API
  version: 1.1.0
  description: Multi-channel inventory management and analytics API.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    InventoryItem:
      type: object
      required: [sku, name]
      properties:
        sku: { type: string }
        name: { type: string }
        total_stock: { type: integer }
        channels:
          type: array
          items:
            type: object
            properties:
              platform: { type: string, example: "Amazon" }
              stock: { type: integer }
    BulkUpdateItem:
      type: object
      required: [sku, adjustment]
      properties:
        sku: { type: string }
        adjustment: { type: integer }
    ErrorResponse:
      type: object
      properties:
        status: { type: integer }
        message: { type: string }
security:
  - bearerAuth: []
paths:
  /inventory:
    get:
      summary: 1. READ (List) - List all products (Paginated)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/InventoryItem' }
        '401':
          description: Unauthorized access
    post:
      summary: 2. CREATE - Create a new product SKU
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryItem' }
      responses:
        '201':
          description: Product successfully created
  /inventory/{sku}:
    get:
      summary: 3. READ (Detail) - Retrieve specific SKU details
      parameters:
        - in: path
          name: sku
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Product details retrieved
    patch:
      summary: 4. UPDATE - Manually adjust single SKU stock
      parameters:
        - in: path
          name: sku
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adjustment: { type: integer, example: -5 }
      responses:
        '200':
          description: Stock level updated
    delete:
      summary: 5. DELETE - Remove a SKU from the system
      parameters:
        - in: path
          name: sku
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Product deleted
  /inventory/bulk:
    put:
      summary: 6. BULK UPDATE - Update multiple SKUs at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/BulkUpdateItem' }
      responses:
        '200':
          description: Bulk stock adjustment successful